name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build ${{ matrix.artifact }} wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            manylinux: "2_34"
            artifact: linux-x86_64
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            manylinux: "off"
            artifact: windows-x86_64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: "off"
            artifact: macos-x86_64
            xcode: "26.2"
          - os: macos-26
            target: aarch64-apple-darwin
            manylinux: "off"
            artifact: macos-arm64
            xcode: "26.5"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up build Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Select Xcode ${{ matrix.xcode }}
        if: contains(matrix.target, 'apple-darwin')
        run: sudo xcode-select --switch /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Build wheel
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ contains(matrix.target, 'apple-darwin') && '13.0' || '' }}
        uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: v1.14.1
          args: --release --out dist --compatibility pypi
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          before-script-linux: |
            dnf install --assumeyes \
              pkgconf-pkg-config \
              clang-devel \
              libxcb-devel \
              libXrandr-devel \
              dbus-devel \
              pipewire-devel \
              wayland-devel \
              mesa-libgbm-devel \
              mesa-libEGL-devel

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.artifact }}
          path: dist/*.whl
          if-no-files-found: error

  test-wheels:
    name: Install ${{ matrix.artifact }} artifact
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: linux-x86_64
          - os: windows-2022
            artifact: windows-x86_64
          - os: macos-15-intel
            artifact: macos-x86_64
          - os: macos-15
            artifact: macos-arm64
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: wheel-${{ matrix.artifact }}
          path: dist

      - name: Install wheel dependencies
        run: python -m pip install --upgrade pip Pillow imageio-ffmpeg

      - name: Install wheel without building from source
        run: python -m pip install --no-index --no-deps --find-links dist windowpulse

      - name: Smoke-test package and commands
        run: |
          python -c "import windowpulse; from PIL import Image; assert windowpulse.WindowRecorder; assert Image.Image"
          windowpulse-video --help
          windowpulse-watch --help

  publish:
    name: Publish trusted release
    needs: test-wheels
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/p/windowpulse
    permissions:
      id-token: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
